# 1. The Bouncer: Catch any unencrypted traffic on Port 80 and force it to HTTPS
server {
    listen 80;
    server_name example.com;
    return 301 https://$host$request_uri;
}

# 2. The Secure Tunnel: Listen on Port 443, apply the keys, and route to Python
server {
    listen 443 ssl;
    server_name example.com;

    # Presentation-only placeholder paths
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # Basic security protocols
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # NEW: Route /live/ requests to the MediaMTX sidecar for secure video delivery
    location /hls/ {
        proxy_pass http://mediamtx:8888/;
        proxy_redirect / /hls/;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pass all other decrypted traffic straight into your FastAPI backend
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}